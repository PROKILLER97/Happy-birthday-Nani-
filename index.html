<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Nani 🎉</title>

<link rel="stylesheet" href="happy birtday.css">

<style>
#music-btn{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 22px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
  box-shadow:0 0 15px rgba(255,255,255,0.6);
  z-index:30;
}
</style>

</head>

<body>

<canvas id="c"></canvas>

<audio id="music" loop>
  <source src="birthday.mp3" type="audio/mpeg">
</audio>

<button id="music-btn">🎵 Play Music</button>

<script>
const btn = document.getElementById("music-btn");
const music = document.getElementById("music");

btn.onclick = () => {
  music.play();
  btn.innerText = "🎶 Music Playing";
};
</script>

<script src="happy birthday Molee.js"></script>

</body>
</html>
